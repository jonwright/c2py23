name: aarch64 CI

on:
  push:
  workflow_dispatch:

jobs:
  test-aarch64:
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Show architecture info
        run: |
          uname -m
          gcc --version | head -1
          file /bin/ls

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install c2py23 and test deps
        run: |
          pip install -e . --quiet
          pip install pytest numpy PyYAML --quiet

      - name: Run tests
        run: pytest tests/ -v --durations=10 --tb=short
