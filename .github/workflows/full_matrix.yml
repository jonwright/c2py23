name: Full Matrix CI

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test-full-linux:
    runs-on: ubuntu-24.04
    timeout-minutes: 20

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14", "3.14t", "3.15", "3.15t"]

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: true

      - name: Install c2py23 and test deps
        run: |
          pip install -e . --quiet
          pip install pytest PyYAML setuptools wheel --quiet

      - name: Install numpy (skip on failure)
        run: pip install numpy --quiet 2>/dev/null || echo "(numpy skipped)"

      - name: Run tests
        run: pytest tests/ -v --durations=10 --tb=short

  test-full-linux-legacy:
    runs-on: ubuntu-22.04
    timeout-minutes: 20

    strategy:
      fail-fast: false
      matrix:
        python-version: ["2.7", "3.6", "3.7", "3.8", "3.9"]

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python (3.x)
        if: matrix.python-version != '2.7'
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Python 2.7
        if: matrix.python-version == '2.7'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends python2 python2-dev python3-virtualenv
          virtualenv -p python2 ${HOME}/cp27
          source ${HOME}/cp27/bin/activate
          ${HOME}/cp27/bin/python -m pip install -U pip setuptools wheel
          echo "${HOME}/cp27/bin" >> $GITHUB_PATH

      - name: Install c2py23 and test deps
        run: |
          python -m pip install -e . --quiet
          python -m pip install pytest PyYAML setuptools wheel --quiet

      - name: Install numpy (numpy<1.17 for 2.7 compat)
        run: python -m pip install 'numpy<1.17' --quiet 2>/dev/null || echo "(numpy skipped)"

      - name: Run tests
        run: python -m pytest tests/ -v --durations=10 --tb=short

  test-full-windows:
    runs-on: windows-latest
    timeout-minutes: 40

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.6", "3.7", "3.8", "3.9", "3.10", "3.11",
                         "3.12", "3.13", "3.14", "3.14t", "3.15", "3.15t"]

    defaults:
      run:
        shell: pwsh

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: true

      - name: ABI diagnostic
        run: |
          python tests/abi_diag.py
          python tests/abi_list_dlls.py

      - name: Set up MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install c2py23 and test deps
        run: |
          python -m pip install -e . --quiet
          python -m pip install pytest PyYAML setuptools wheel --quiet

      - name: Install numpy (skip on failure)
        run: python -m pip install numpy --quiet 2>$null
        continue-on-error: true

      - name: Run tests
        env:
          CC: cl
        run: python -m pytest tests/ -v --durations=10 --tb=short
