name: Full Matrix CI

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test-linux-gaps:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        # Python 3.7 dropped (setup-python removed it from ubuntu-24.04)
        python-version: ["3.8", "3.9", "3.10", "3.11", "3.13"]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install c2py23 and test deps
        run: |
          pip install -e . --quiet
          pip install pytest PyYAML setuptools wheel --quiet
      - name: Install numpy
        run: |
          pip install --only-binary=:all: numpy --quiet 2>/dev/null || echo "(numpy skipped)"
      - name: Run tests
        run: pytest tests/ -v --durations=10 --tb=short --ignore=tests/test_peer_review.py --ignore=tests/test_aos_soa.py --ignore=tests/test_ndarray_backends.py

  test-windows-gaps:
    runs-on: windows-latest
    timeout-minutes: 40
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.7", "3.8", "3.9", "3.10", "3.11", "3.13"]
    defaults:
      run:
        shell: pwsh
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: ABI diagnostic
        run: |
          python tests/abi_diag.py
          python tests/abi_list_dlls.py
      - name: Set up MSVC
        uses: ilammy/msvc-dev-cmd@v1
      - name: Install c2py23 and test deps
        run: |
          python -m pip install -e . --quiet
          python -m pip install pytest PyYAML setuptools wheel --quiet
      - name: Install numpy
        run: |
          python -m pip install numpy --quiet 2>$$null
        continue-on-error: true
      - name: Run tests
        env:
          CC: cl
        run: python -m pytest tests/ -v --durations=10 --tb=short
