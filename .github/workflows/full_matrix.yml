name: Full Matrix CI

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test-linux-gaps:
    runs-on: ubuntu-24.04
    timeout-minutes: 20

    strategy:
      fail-fast: false
      matrix:
        # Versions NOT covered by linux.yml per-push (3.7-3.11, 3.13).
        # linux.yml already tests 2.7, 3.12, 3.14, 3.14t, 3.15, 3.15t.
        # Python 3.6 is tested on Windows per-push; dropped from Linux.
        python-version: ["3.7", "3.8", "3.9", "3.10", "3.11", "3.13"]

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install c2py23 and test deps
        run: |
          pip install -e . --quiet
          pip install pytest PyYAML setuptools wheel --quiet

      - name: Install numpy (skip on failure)
        run: pip install numpy --quiet 2>/dev/null || echo "(numpy skipped)"

      - name: Run tests
        run: pytest tests/ -v --durations=10 --tb=short

  test-windows-gaps:
    runs-on: windows-latest
    timeout-minutes: 40

    strategy:
      fail-fast: false
      matrix:
        # Versions NOT covered by windows.yml per-push (3.7-3.11, 3.13).
        # windows.yml already tests 2.7, 3.6, 3.12, 3.14, 3.14t, 3.15, 3.15t.
        python-version: ["3.7", "3.8", "3.9", "3.10", "3.11", "3.13"]

    defaults:
      run:
        shell: pwsh

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: ABI diagnostic
        run: |
          python tests/abi_diag.py
          python tests/abi_list_dlls.py

      - name: Set up MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install c2py23 and test deps
        run: |
          python -m pip install -e . --quiet
          python -m pip install pytest PyYAML setuptools wheel --quiet

      - name: Install numpy (skip on failure)
        run: python -m pip install numpy --quiet 2>$null
        continue-on-error: true

      - name: Run tests
        env:
          CC: cl
        run: python -m pytest tests/ -v --durations=10 --tb=short
