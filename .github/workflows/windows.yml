name: Windows CI

on:
  push:
  workflow_dispatch:

jobs:
  # Dlsym: compile once per Python, test
  test-windows:
    runs-on: windows-latest
    timeout-minutes: 15

    strategy:
      fail-fast: false
      matrix:
        python-version: ["2.7", "3.6", "3.12", "3.14", "3.14t", "3.15", "3.15t"]

    defaults:
      run:
        shell: pwsh

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        if: matrix.python-version != '2.7'
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: true

      - name: Set up Python 2.7
        if: matrix.python-version == '2.7'
        run: |
          $url = "https://www.python.org/ftp/python/2.7.18/python-2.7.18.amd64.msi"
          $msi = "$env:RUNNER_TEMP\python-2.7.18.amd64.msi"
          Invoke-WebRequest -Uri $url -OutFile $msi
          Start-Process msiexec.exe -Wait -ArgumentList "/i `"$msi`" /quiet /norestart TARGETDIR=C:\Python27"
          echo "C:\Python27" >> $env:GITHUB_PATH
          echo "C:\Python27\Scripts" >> $env:GITHUB_PATH
          $env:Path = "C:\Python27;C:\Python27\Scripts;$env:Path"
          python --version
          python -m ensurepip 2>$null
          python -m pip install --upgrade pip --quiet

      - name: ABI diagnostic (Python)
        if: matrix.python-version != '2.7'
        run: |
          python tests/abi_diag.py
          python tests/abi_list_dlls.py

      - name: Set up MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: ABI diagnostic (C compile)
        if: matrix.python-version != '2.7'
        run: python tests/abi_check_win.py

      - name: Install c2py23 and test deps
        run: |
          python -m pip install -e . --quiet
          python -m pip install pytest setuptools wheel --quiet

      - name: Install numpy (stable 3.x)
        if: matrix.python-version == '3.6' || matrix.python-version == '3.12' || matrix.python-version == '3.14'
        run: "python -m pip install --only-binary=:all: numpy --quiet"

      - name: Install numpy (3.14t FT)
        if: matrix.python-version == '3.14t'
        run: "python -m pip install --only-binary=:all: numpy --quiet 2>$null"
        continue-on-error: true

      - name: Install numpy (2.7)
        if: matrix.python-version == '2.7'
        run: "python -m pip install --only-binary=:all: 'numpy<1.17' --quiet"

      - name: Install numpy (3.15 pre-release / 3.15t via cgohlke MKL wheels)
        if: matrix.python-version == '3.15' || matrix.python-version == '3.15t'
        run: |
          $ver = if ("${{ matrix.python-version }}" -eq "3.15") { "cp315-cp315" } else { "cp315-cp315t" }
          $url = "https://github.com/cgohlke/numpy-mkl-wheels/releases/download/v2026.5.20/numpy-2.4.6-$ver-win_amd64.whl"
          Write-Output "Downloading numpy from: $url"
          python -m pip install --only-binary=:all: "$url" --quiet 2>$null
        continue-on-error: true

      - name: Run tests (3.x)
        if: matrix.python-version != '2.7'
        env:
          CC: cl
          MSVC: "1"
        run: python -m pytest tests/ -v --durations=10 --tb=short

      - name: Run tests (2.7)
        if: matrix.python-version == '2.7'
        env:
          CC: cl
          MSVC: "1"
        run: python -m pytest tests/ -v --durations=10 --tb=short --ignore=tests/test_peer_review.py --ignore=tests/test_aos_soa.py

  # Single-header: build fill module with only c2py.h (no c2py_runtime.c)
  test-windows-single-header:
    runs-on: windows-latest
    timeout-minutes: 15

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]

    defaults:
      run:
        shell: pwsh

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install c2py23 and test deps
        run: |
          python -m pip install -e . --quiet
          python -m pip install pytest setuptools wheel numpy --quiet

      - name: Build and test (single-header, 3.12)
        run: |
          # Generate wrapper with --emit-header to use c2py.h
          python -m c2py23 tests/cases/fill/fill.c -o fillmod_wrapper.c --emit-header
          # Verify wrapper uses c2py.h, not c2py_runtime.h
          Select-String -Path fillmod_wrapper.c -Pattern "C2PY_IMPLEMENTATION" | ForEach-Object { Write-Output "Wrapper uses single-header: OK" }
          Select-String -Path fillmod_wrapper.c -Pattern "c2py_runtime.h" | ForEach-Object { throw "Wrapper should not include c2py_runtime.h" }
          # Compile with only c2py.h (no c2py_runtime.c, no -I flag)
          cl /O2 /LD /Itests/cases/fill fillmod_wrapper.c tests/cases/fill/fill.c /link /OUT:fillmod.pyd
          # Test the module
          python -c "import sys, ctypes, importlib.util, importlib.machinery; l=importlib.machinery.ExtensionFileLoader('fillmod', 'fillmod.pyd'); s=importlib.util.spec_from_file_location('fillmod', 'fillmod.pyd', loader=l); m=importlib.util.module_from_spec(s); l.exec_module(m); arr=(ctypes.c_float * 4)(0,0,0,0); m.fill(arr, 42.0); assert list(arr) == [42.0, 42.0, 42.0, 42.0]; print('PASS: single-header MSVC build works')"

  # i386: dlsym + pythonh (end members for 32-bit coverage)
  test-windows-i386:
    runs-on: windows-latest
    timeout-minutes: 20

    strategy:
      fail-fast: false
      matrix:
        python-version: ["2.7", "3.12"]

    defaults:
      run:
        shell: pwsh

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        if: matrix.python-version != '2.7'
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          architecture: 'x86'

      - name: Set up Python 2.7 (i386)
        if: matrix.python-version == '2.7'
        run: |
          $url = "https://www.python.org/ftp/python/2.7.18/python-2.7.18.msi"
          $msi = "$env:RUNNER_TEMP\python-2.7.18.msi"
          Invoke-WebRequest -Uri $url -OutFile $msi
          Start-Process msiexec.exe -Wait -ArgumentList "/i `"$msi`" /quiet /norestart TARGETDIR=C:\Python27"
          echo "C:\Python27" >> $env:GITHUB_PATH
          echo "C:\Python27\Scripts" >> $env:GITHUB_PATH
          $env:Path = "C:\Python27;C:\Python27\Scripts;$env:Path"
          python --version
          python -m ensurepip 2>$null
          python -m pip install --upgrade pip --quiet

      - name: Set up MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: 'x86'

      - name: ABI diagnostic (C compile)
        if: matrix.python-version != '2.7'
        run: python tests/abi_check_win.py

      - name: Install c2py23 and test deps
        run: |
          python -m pip install -e . --quiet
          python -m pip install pytest setuptools wheel --quiet

      - name: Install numpy (3.12)
        if: matrix.python-version != '2.7'
        run: "python -m pip install --only-binary=:all: numpy --quiet"

      - name: Install numpy (2.7)
        if: matrix.python-version == '2.7'
        run: "python -m pip install --only-binary=:all: 'numpy<1.17' --quiet"

      - name: Run tests (3.12, dlsym)
        if: matrix.python-version != '2.7'
        env:
          CC: cl
          MSVC: "1"
        run: python -m pytest tests/ -v --durations=10 --tb=short

      - name: Run tests (2.7, dlsym)
        if: matrix.python-version == '2.7'
        env:
          CC: cl
          MSVC: "1"
        run: python -m pytest tests/ -v --durations=10 --tb=short --ignore=tests/test_peer_review.py --ignore=tests/test_aos_soa.py

      - name: Build and test (pythonh, 3.12)
        if: matrix.python-version != '2.7'
        env:
          CC: cl
        run: |
          python -m c2py23 tests/cases/fill/fill.c -o fillmod_wrapper.c
          python -c "from setuptools import setup, Extension; from c2py23.setuptools_helper import PythonhCmdclass; setup(name='fill_ph', ext_modules=[Extension('fillmod', ['fillmod_wrapper.c', 'tests/cases/fill/fill.c', 'c2py23/runtime/c2py_runtime.c'], include_dirs=['c2py23/runtime', 'tests/cases/fill'])], cmdclass=PythonhCmdclass, script_args=['build_ext', '--inplace'])"
          python -c "import sys, ctypes, importlib.util, importlib.machinery, sysconfig; ext = sysconfig.get_config_var('EXT_SUFFIX') or '.pyd'; l = importlib.machinery.ExtensionFileLoader('fillmod', 'fillmod' + ext); s = importlib.util.spec_from_file_location('fillmod', 'fillmod' + ext, loader=l); m = importlib.util.module_from_spec(s); l.exec_module(m); arr = (ctypes.c_float * 4)(0,0,0,0); m.fill(arr, 42.0); assert list(arr) == [42.0, 42.0, 42.0, 42.0]; print('Python 3.12 i386 --pythonh: PASS')"

      - name: Build and test (pythonh, 2.7)
        if: matrix.python-version == '2.7'
        env:
          CC: cl
          DISTUTILS_USE_SDK: "1"
          MSSdk: "1"
        run: |
          python -m c2py23 tests/cases/fill/fill.c -o fillmod_wrapper.c
          python -c "from setuptools import setup, Extension; from c2py23.setuptools_helper import PythonhCmdclass; setup(name='fill_ph', ext_modules=[Extension('fillmod', ['fillmod_wrapper.c', 'tests/cases/fill/fill.c', 'c2py23/runtime/c2py_runtime.c'], include_dirs=['c2py23/runtime', 'tests/cases/fill'])], cmdclass=PythonhCmdclass, script_args=['build_ext', '--inplace'])"
          python -c "import sys, ctypes, sysconfig, imp; ext = sysconfig.get_config_var('EXT_SUFFIX') or '.pyd'; m = imp.load_dynamic('fillmod', 'fillmod' + ext); arr = (ctypes.c_float * 4)(0,0,0,0); m.fill(arr, 42.0); assert list(arr) == [42.0, 42.0, 42.0, 42.0]; print('Python 2.7 i386 --pythonh: PASS')"
