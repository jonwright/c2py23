name: Windows CI

on:
  push:
  workflow_dispatch:

jobs:
  test-windows:
    runs-on: windows-latest
    timeout-minutes: 15

    strategy:
      fail-fast: false
      matrix:
        python-version: ["2.7", "3.6", "3.12", "3.14", "3.14t", "3.15", "3.15t"]

    defaults:
      run:
        shell: pwsh

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        if: matrix.python-version != '2.7'
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: true

      - name: Set up Python 2.7
        if: matrix.python-version == '2.7'
        run: |
          $url = "https://www.python.org/ftp/python/2.7.18/python-2.7.18.amd64.msi"
          $msi = "$env:RUNNER_TEMP\python-2.7.18.amd64.msi"
          Invoke-WebRequest -Uri $url -OutFile $msi
          Start-Process msiexec.exe -Wait -ArgumentList "/i `"$msi`" /quiet /norestart TARGETDIR=C:\Python27"
          echo "C:\Python27" >> $env:GITHUB_PATH
          echo "C:\Python27\Scripts" >> $env:GITHUB_PATH
          $env:Path = "C:\Python27;C:\Python27\Scripts;$env:Path"
          python --version
          python -m ensurepip 2>$null
          python -m pip install --upgrade pip --quiet

      - name: ABI diagnostic (Python)
        if: matrix.python-version != '2.7'
        run: |
          python tests/abi_diag.py
          python tests/abi_list_dlls.py

      - name: Set up MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: ABI diagnostic (C compile)
        if: matrix.python-version != '2.7'
        run: python tests/abi_check_win.py

      - name: Install c2py23 and test deps
        run: |
          python -m pip install -e . --quiet
          python -m pip install pytest PyYAML setuptools wheel --quiet

      - name: Install numpy (stable 3.x)
        if: matrix.python-version == '3.6' || matrix.python-version == '3.12' || matrix.python-version == '3.14'
        run: python -m pip install numpy --quiet

      - name: Install numpy (3.14t FT)
        if: matrix.python-version == '3.14t'
        run: python -m pip install numpy --quiet 2>$null
        continue-on-error: true

      - name: Install numpy (3.15 pre-release / 3.15t via cgohlke MKL wheels)
        if: matrix.python-version == '3.15' || matrix.python-version == '3.15t'
        run: |
          $ver = if ("${{ matrix.python-version }}" -eq "3.15") { "cp315-cp315" } else { "cp315-cp315t" }
          $url = "https://github.com/cgohlke/numpy-mkl-wheels/releases/download/v2026.5.20/numpy-2.4.6-$ver-win_amd64.whl"
          Write-Output "Downloading numpy from: $url"
          python -m pip install --only-binary=:all: "$url" --quiet 2>$null
        continue-on-error: true

      - name: Run tests (3.x)
        if: matrix.python-version != '2.7'
        env:
          CC: cl
        run: python -m pytest tests/ -v --durations=10 --tb=short

      - name: Run tests (2.7)
        if: matrix.python-version == '2.7'
        env:
          CC: cl
        run: python -m pytest tests/ -v --durations=10 --tb=short --ignore=tests/test_peer_review.py --ignore=tests/test_aos_soa.py
