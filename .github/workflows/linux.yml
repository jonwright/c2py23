name: Linux CI

on:
  push:
  workflow_dispatch:

jobs:
  # Dlsym: compile once, test on multiple Python versions
  test-linux:
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.14", "3.14t", "3.15", "3.15t"]

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Check 7-bit ASCII compliance
        run: git ls-files | python tools/check_ascii.py

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: true

      - name: Install c2py23 and test deps
        run: |
          pip install -e . --quiet
          pip install pytest setuptools wheel --quiet

      - name: ABI diagnostic
        run: python tests/abi_list_dlls.py

      - name: Install numpy (skip on failure for pre-release versions)
        run: |
          pip install --only-binary=:all: numpy --quiet 2>/dev/null || \
          pip install --only-binary=:all: --extra-index-url https://pypi.anaconda.org/scientific-python-nightly-wheels/simple numpy --quiet 2>/dev/null || \
          echo "(numpy skipped)"

      - name: Run tests
        run: python tests/runner.py

  # Python 2.7: dlsym only (no pythonh on 2.7 in CI)
  test-linux-27:
    runs-on: ubuntu-22.04
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Python 2.7
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends python2 python2-dev python3-virtualenv
          virtualenv -p python2 ${HOME}/cp27
          source ${HOME}/cp27/bin/activate
          ${HOME}/cp27/bin/python -m pip install -U pip setuptools wheel
          echo "${HOME}/cp27/bin" >> $GITHUB_PATH

      - name: Install c2py23 and test deps
        run: |
          python -m pip install -e . --quiet
          python -m pip install pytest --quiet

      - name: Install numpy
        run: python -m pip install 'numpy<1.17' --quiet

      - name: Run tests
        run: python -m pytest tests/ -v --durations=10 --tb=short

  # Pythonh: end-member smoke tests (build + import fill)
  test-pythonh:
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.14t"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: true

      - name: Install c2py23
        run: pip install -e . setuptools wheel --quiet

      - name: Build and test pythonh
        env:
          CC: gcc
        run: |
          python -m c2py23 tests/cases/fill/fill.c -o fillmod_wrapper.c
          CC=gcc LIBS="-ldl -lm" python -c "
          from setuptools import setup, Extension
          from c2py23.setuptools_helper import PythonhCmdclass
          setup(name='fill_ph',
              ext_modules=[Extension('fillmod',
              ['fillmod_wrapper.c', 'tests/cases/fill/fill.c',
               'c2py23/runtime/c2py_runtime.c'],
              include_dirs=['c2py23/runtime', 'tests/cases/fill'])],
              cmdclass=PythonhCmdclass,
              script_args=['build_ext', '--inplace'])
          "
          python -c "
          import sys, ctypes, importlib.util, importlib.machinery
          l = importlib.machinery.ExtensionFileLoader('fillmod', 'fillmod' + __import__('sysconfig').get_config_var('EXT_SUFFIX'))
          s = importlib.util.spec_from_file_location('fillmod', 'fillmod' + __import__('sysconfig').get_config_var('EXT_SUFFIX'), loader=l)
          m = importlib.util.module_from_spec(s)
          l.exec_module(m)
          arr = (ctypes.c_float * 4)(0,0,0,0)
          m.fill(arr, 42.0)
          assert list(arr) == [42.0, 42.0, 42.0, 42.0]
          print('Python ${{ matrix.python-version }} --pythonh: PASS')
           "

  # PyPy: dlsym only (experimental -- see issue #81)
  test-linux-pypy:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    continue-on-error: true

    strategy:
      fail-fast: false
      matrix:
        pypy-version: ['pypy3.10', 'pypy3.9']

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up PyPy
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.pypy-version }}

      - name: Install c2py23 and test deps
        run: |
          pip install -e . --quiet
          pip install pytest --quiet

      - name: Install numpy (PyPy may not have wheels)
        run: pip install numpy --quiet 2>/dev/null || echo "(numpy skipped)"
        continue-on-error: true

      - name: Run tests (dlsym)
        env:
          CC: gcc
          CFLAGS: -DC2PY_TARGET_PYPY -O1 -fPIC
        run: |
          make -f tests/Makefile all
          python -m pytest tests/ -v --durations=10 --tb=short \
            --ignore=tests/test_workspace \
            --ignore=tests/test_peer_review.py \
            --ignore=tests/test_aos_soa.py \
            --ignore=tests/test_ndarray_backends.py \
            --ignore=tests/test_abi_tag_compatibility.py \
            --ignore=tests/test_error_paths.py \
            --ignore=tests/test_leaks.py \
            --ignore=tests/test_lifecycle.py
