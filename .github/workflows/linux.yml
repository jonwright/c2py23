name: Linux CI

on:
  push:
  workflow_dispatch:

jobs:
  test-linux:
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.14", "3.14t", "3.15", "3.15t"]

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: true

      - name: Install c2py23 and test deps
        run: |
          pip install -e . --quiet
          pip install pytest PyYAML setuptools wheel --quiet

      - name: ABI diagnostic
        run: python tests/abi_list_dlls.py

      - name: Install numpy (skip on failure for pre-release versions)
        run: pip install numpy --quiet 2>/dev/null || echo "(numpy skipped)"

      - name: Run tests
        run: pytest tests/ -v --durations=10 --tb=short

  test-linux-27:
    runs-on: ubuntu-22.04
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Python 2.7
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends python2 python2-dev python3-virtualenv
          virtualenv -p python2 ${HOME}/cp27
          source ${HOME}/cp27/bin/activate
          ${HOME}/cp27/bin/python -m pip install -U pip setuptools wheel
          echo "${HOME}/cp27/bin" >> $GITHUB_PATH

      - name: Install c2py23 and test deps
        run: |
          python -m pip install -e . --quiet
          python -m pip install pytest PyYAML --quiet

      - name: Run tests
        run: python -m pytest tests/ -v --durations=10 --tb=short
