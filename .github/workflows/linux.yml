name: Linux CI

on:
  push:
  workflow_dispatch:

jobs:
  test-linux:
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install c2py23 and test deps
        run: |
          pip install -e . --quiet
          pip install pytest numpy --quiet

      - name: Run tests
        run: pytest tests/ -v --durations=10 --tb=short
