name: Linux CI

on:
  push:
  workflow_dispatch:

jobs:
  test-linux:
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.14", "3.14t", "3.15", "3.15t"]

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: true

      - name: Install c2py23 and test deps
        run: |
          pip install -e . --quiet
          pip install pytest PyYAML --quiet

      - name: Install numpy (skip on failure for pre-release versions)
        run: pip install numpy --quiet 2>/dev/null || echo "(numpy skipped -- no wheel for this Python)"
        shell: bash

      - name: Run tests
        run: pytest tests/ -v --durations=10 --tb=short

  test-linux-3.13:
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install c2py23 and test deps
        run: |
          pip install -e . --quiet
          pip install pytest PyYAML numpy --quiet

      - name: Run tests
        run: pytest tests/ -v --durations=10 --tb=short
